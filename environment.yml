name: clic
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch::pytorch::*=*cuda*
  - pytorch::torchvision
  - pytorch::torchaudio
  - pytorch::pytorch-cuda=11.8
  - numpy
  - scipy
  - matplotlib
  - seaborn
  - pandas
  - scikit-learn
  - pyyaml
  - pytest
  - pip
  - pip:
    - wandb>=0.15.0
    - tensorboard>=2.13.0
    - black>=23.3.0
    - flake8>=6.0.0
    - mypy>=1.3.0
